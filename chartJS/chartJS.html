<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade ChartJS</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container1">
        <table>
            <tr>
                <th>Horário</th>
                <th>Temperatura</th>
                <th>Umidade</th>
            </tr>
            <tr>
                <td>12:00</td>
                <td>30</td>
                <td>80</td>
            </tr>
            <tr>
                <td>13:00</td>
                <td>29</td>
                <td>82</td>
            </tr>
            <tr>
                <td>14:00</td>
                <td>28</td>
                <td>80</td>
            </tr>
            <tr>
                <td>15:00</td>
                <td>25</td>
                <td>85</td>
            </tr>
            <tr>
                <td>16:00</td>
                <td>22</td>
                <td>80</td>
            </tr>
            <tr>
                <td>17:00</td>
                <td>23</td>
                <td>83</td>
            </tr>
        </table>

        <div class="grafico">
            <canvas id="myChart1"></canvas>
        </div>
    </div>

    <div class="container2">
        <table>
            <tr>
                <th>Mês</th>
                <th>Temperatura Média</th>
                <th>Umidade Média</th>
            </tr>
            <tr>
                <td>Janeiro</td>
                <td>22</td>
                <td>90</td>
            </tr>
            <tr>
                <td>Fevereiro</td>
                <td>24</td>
                <td>89</td>
            </tr>
            <tr>
                <td>Março</td>
                <td>27</td>
                <td>93</td>
            </tr>
            <tr>
                <td>Abril</td>
                <td>23</td>
                <td>87</td>
            </tr>
            <tr>
                <td>Maio</td>
                <td>20</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Junho</td>
                <td>18</td>
                <td>82</td>
            </tr>
        </table>

        <div class="grafico">
            <canvas id="myChart2"></canvas>
        </div>

    </div>


</body>

</html>

<script>

    Chart.defaults.color = '#ffffff';
    const ctx1 = document.getElementById('myChart1');

    new Chart(ctx1, {
        type: 'line',
        data: {
            labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
            datasets: [{
                label: 'Temperatura',
                data: [30, 29, 28, 25, 22, 23],
                borderWidth: 1,
                borderColor: '#a83dfe',
                backgroundColor: '#a83dfe'
            },
            {
                label: 'Umidade',
                data: [80, 82, 80, 85, 80, 83],
                borderWidth: 1,
                borderColor: '#2653fd',
                backgroundColor: '#2653fd'
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctx2 = document.getElementById('myChart2');

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Janeiro', 'Feveiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura Média',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1,
                borderColor: '#a83dfe',
                backgroundColor: '#a83dfe'
            },
            {
                label: 'Umidade Média',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 1,
                borderColor: '#2653fd',
                backgroundColor: '#2653fd'
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
